<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>懒猫 MCP</title>
  <link rel="stylesheet" href="/console.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">M</div>
        <div>
          <h1>懒猫 MCP</h1>
          <p class="muted" data-i18n="subtitle">多实例 MCP 网关</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="language-switch" role="group" data-i18n-aria="language">
          <button type="button" data-lang-option="zh">中文</button>
          <button type="button" data-lang-option="en">EN</button>
        </div>
        <div class="status" id="statusPills"></div>
      </div>
    </header>

    <section class="grid">
      <div class="stack">
        <section class="panel" aria-labelledby="providerTitle">
          <div class="panel-head">
            <div>
              <h2 id="providerTitle" data-i18n="programMcp">添加 MCP 上游</h2>
              <p class="muted" data-i18n="resourceFilteredApps">选择懒猫应用或添加外部 MCP 服务</p>
            </div>
            <button class="ghost" id="reloadBtn" type="button" data-i18n="refresh">刷新</button>
          </div>
          <div class="panel-body">
            <form id="providerForm" class="form-grid">
              <div class="mode-tabs span-2" role="tablist" data-i18n-aria="providerType">
                <button type="button" id="lazycatModeBtn" role="tab" aria-controls="lazycatFields" data-provider-mode="lazycat" data-i18n="lazycatApp">懒猫应用</button>
                <button type="button" id="customModeBtn" role="tab" aria-controls="customFields" data-provider-mode="custom" data-i18n="customMcp">添加自定义 MCP</button>
              </div>
              <div id="lazycatFields" class="form-section span-2">
                <label class="span-2"><span data-i18n="app">程序</span>
                  <select id="appSelect" required></select>
                </label>
                <label><span data-i18n="appSubpath">程序子路径</span>
                  <input id="slugInput" autocomplete="off" required>
                </label>
                <label><span data-i18n="resourceProvider">资源 Provider</span>
                  <select id="resourceSelect"></select>
                </label>
                <label class="span-2"><span data-i18n="programMcpPath">程序 MCP 路径</span>
                  <input id="endpointInput" autocomplete="off" required>
                </label>
              </div>
              <div id="customFields" class="form-section span-2" hidden>
                <label><span data-i18n="providerName">名称</span>
                  <input id="customNameInput" autocomplete="off" placeholder="Context7" required disabled>
                </label>
                <label><span data-i18n="customSubpath">公开路径</span>
                  <input id="customSlugInput" autocomplete="off" placeholder="context7" required disabled>
                </label>
                <label class="span-2"><span data-i18n="description">说明</span>
                  <input id="customDescriptionInput" autocomplete="off" data-i18n-placeholder="optional" placeholder="选填" disabled>
                </label>
                <label class="span-2"><span data-i18n="serviceURL">服务地址</span>
                  <input id="customBaseURLInput" autocomplete="off" inputmode="url" placeholder="https://example.com" required disabled>
                </label>
                <label><span data-i18n="mcpPath">MCP 路径</span>
                  <input id="customEndpointInput" autocomplete="off" value="/mcp" required disabled>
                </label>
                <label><span data-i18n="transport">传输方式</span>
                  <select id="customTransportSelect" required disabled>
                    <option value="streamable_http">Streamable HTTP</option>
                    <option value="sse">SSE</option>
                  </select>
                </label>
                <div class="header-editor span-2">
                  <div class="field-head">
                    <span data-i18n="headers">请求头</span>
                    <button type="button" class="ghost compact" id="addHeaderBtn" data-i18n="addHeader" disabled>添加</button>
                  </div>
                  <div id="headerRows" class="header-rows"></div>
                </div>
              </div>
              <div class="actions span-2">
                <button class="primary" id="saveProviderBtn" type="submit" data-i18n="save">保存</button>
                <span class="muted mono" id="suggestedPath"></span>
              </div>
            </form>
          </div>
        </section>

        <section class="panel" aria-labelledby="providersTitle">
          <div class="panel-head">
            <h2 id="providersTitle" data-i18n="publishedUpstreams">已发布上游</h2>
            <span class="pill info" id="providerCount">0</span>
          </div>
          <div class="panel-body">
            <div id="providerList" class="list"></div>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="panel" aria-labelledby="tokenTitle">
          <div class="panel-head">
            <h2 id="tokenTitle">MCP Token</h2>
            <span class="pill" id="tokenCount">0</span>
          </div>
          <div class="panel-body">
            <form id="tokenForm" class="actions">
              <input id="tokenNameInput" data-i18n-aria="tokenName" data-i18n-placeholder="tokenName" aria-label="Token 名称" placeholder="Token 名称" autocomplete="off">
              <button class="primary" type="submit" data-i18n="create">创建</button>
            </form>
            <div class="token-once" id="tokenOnce">
              <h3 data-i18n="newToken">新 Token</h3>
              <div class="mono" id="tokenValue"></div>
              <div class="actions">
                <button type="button" id="copyTokenBtn" data-i18n="copy">复制</button>
              </div>
            </div>
            <div id="tokenList" class="list"></div>
          </div>
        </section>

        <section class="panel" aria-labelledby="skillTitle">
          <div class="panel-head">
            <h2 id="skillTitle" data-i18n="skillInstallPath">Skills 安装路径</h2>
            <span class="pill ok">HTTP</span>
          </div>
          <div class="panel-body">
            <div class="item">
              <div class="mono" id="skillPath">-</div>
              <div class="actions">
                <button type="button" id="copySkillBtn" data-i18n="copy">复制</button>
              </div>
            </div>
            <div class="item">
              <h3 data-i18n="selfMcp">本程序 MCP</h3>
              <div class="mono" id="selfMcpPath">/mcp</div>
              <div class="mono muted" id="buildInfo">-</div>
              <span class="pill warn">Token</span>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const messages = {
      zh: {
        title: "懒猫 MCP",
        subtitle: "多实例 MCP 网关",
        language: "语言",
        programMcp: "添加 MCP 上游",
        resourceFilteredApps: "选择懒猫应用或添加外部 MCP 服务",
        refresh: "刷新",
        providerType: "MCP 类型",
        lazycatApp: "懒猫应用",
        customMcp: "添加自定义 MCP",
        app: "程序",
        appSubpath: "程序子路径",
        customSubpath: "公开路径",
        resourceProvider: "资源 Provider",
        programMcpPath: "程序 MCP 路径",
        providerName: "名称",
        description: "说明",
        optional: "选填",
        serviceURL: "服务地址",
        mcpPath: "MCP 路径",
        transport: "传输方式",
        headers: "请求头",
        addHeader: "添加",
        headerName: "请求头",
        headerValue: "值",
        removeHeader: "删除请求头",
        save: "保存",
        publishedUpstreams: "已发布上游",
        tokenName: "Token 名称",
        create: "创建",
        newToken: "新 Token",
        copy: "复制",
        skillInstallPath: "Skills 安装路径",
        selfMcp: "本程序 MCP",
        ticketCaptured: "用户票据已捕获",
        waitingTicket: "等待用户票据",
        tokenCount: "Token {count}",
        providerCount: "Provider {count}",
        versionLabel: "版本 {version}",
        buildTime: "构建",
        commit: "提交",
        noResourceApps: "未发现带资源的程序",
        manualInput: "手动输入",
        noTokens: "还没有 Token",
        disable: "禁用",
        enable: "启用",
        delete: "删除",
        enabled: "启用",
        disabled: "禁用",
        noProviders: "还没有发布上游",
        stop: "停用",
        available: "可用",
        stopped: "停用",
        upstreamCustom: "自定义",
        upstreamLazycat: "懒猫",
        copied: "已复制",
        copyFailed: "复制失败",
        saved: "已保存"
      },
      en: {
        title: "LazyCat MCP",
        subtitle: "Multi-instance MCP gateway",
        language: "Language",
        programMcp: "Add MCP upstream",
        resourceFilteredApps: "Choose a LazyCat app or add an external MCP service",
        refresh: "Refresh",
        providerType: "MCP type",
        lazycatApp: "LazyCat app",
        customMcp: "Add custom MCP",
        app: "App",
        appSubpath: "App subpath",
        customSubpath: "Public path",
        resourceProvider: "Resource Provider",
        programMcpPath: "App MCP path",
        providerName: "Name",
        description: "Description",
        optional: "Optional",
        serviceURL: "Service URL",
        mcpPath: "MCP path",
        transport: "Transport",
        headers: "Headers",
        addHeader: "Add",
        headerName: "Header",
        headerValue: "Value",
        removeHeader: "Remove header",
        save: "Save",
        publishedUpstreams: "Published Upstreams",
        tokenName: "Token name",
        create: "Create",
        newToken: "New Token",
        copy: "Copy",
        skillInstallPath: "Skills install path",
        selfMcp: "This app MCP",
        ticketCaptured: "User ticket captured",
        waitingTicket: "Waiting for user ticket",
        tokenCount: "Token {count}",
        providerCount: "Provider {count}",
        versionLabel: "Version {version}",
        buildTime: "Build",
        commit: "Commit",
        noResourceApps: "No apps with resources found",
        manualInput: "Manual input",
        noTokens: "No tokens yet",
        disable: "Disable",
        enable: "Enable",
        delete: "Delete",
        enabled: "Enabled",
        disabled: "Disabled",
        noProviders: "No upstreams published yet",
        stop: "Stop",
        available: "Available",
        stopped: "Stopped",
        upstreamCustom: "Custom",
        upstreamLazycat: "LazyCat",
        copied: "Copied",
        copyFailed: "Copy failed",
        saved: "Saved"
      }
    };

    const state = {
      status: null,
      apps: [],
      tokens: [],
      providers: [],
      providerMode: "lazycat"
    };

    const $ = (id) => document.getElementById(id);
    let currentLang = initialLanguage();

    function initialLanguage() {
      const saved = localStorage.getItem("lazycat-mcp-lang");
      if (saved === "zh" || saved === "en") return saved;
      return navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
    }

    function t(key, vars = {}) {
      const template = (messages[currentLang] && messages[currentLang][key]) || messages.zh[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => String(vars[name] ?? ""));
    }

    function setLanguage(lang, persist = true) {
      currentLang = lang === "en" ? "en" : "zh";
      if (persist) localStorage.setItem("lazycat-mcp-lang", currentLang);
      applyI18n();
      render();
    }

    function applyI18n() {
      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
      document.title = t("title");
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
        node.setAttribute("placeholder", t(node.dataset.i18nPlaceholder));
      });
      document.querySelectorAll("[data-i18n-aria]").forEach((node) => {
        node.setAttribute("aria-label", t(node.dataset.i18nAria));
      });
      document.querySelectorAll("[data-lang-option]").forEach((button) => {
        const active = button.dataset.langOption === currentLang;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
      updateHeaderRowI18n();
    }

    function updateHeaderRowI18n() {
      document.querySelectorAll("#headerRows .header-row").forEach((row) => {
        const inputs = row.querySelectorAll("input");
        if (inputs[0]) inputs[0].placeholder = t("headerName");
        if (inputs[1]) inputs[1].placeholder = t("headerValue");
        const button = row.querySelector("button");
        if (button) button.setAttribute("aria-label", t("removeHeader"));
      });
    }

    function api(path, options = {}) {
      const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
      return fetch(path, Object.assign({}, options, { headers })).then(async (res) => {
        if (res.status === 204) return null;
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const message = data.error && data.error.message ? data.error.message : res.statusText;
          throw new Error(message);
        }
        return data;
      });
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.style.display = "block";
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => { toast.style.display = "none"; }, 3600);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(
        () => showToast(t("copied")),
        () => showToast(t("copyFailed"))
      );
    }

    async function loadAll() {
      const [status, apps, tokens, providers] = await Promise.all([
        api("/api/status"),
        api("/api/apps"),
        api("/api/tokens"),
        api("/api/providers")
      ]);
      state.status = status;
      state.apps = apps.apps || [];
      state.tokens = tokens.tokens || [];
      state.providers = providers.providers || [];
      render();
    }

    function render() {
      renderStatus();
      renderProviderMode();
      renderApps();
      renderTokens();
      renderProviders();
      renderSkill();
    }

    function renderProviderMode() {
      const isCustom = state.providerMode === "custom";
      $("lazycatFields").hidden = isCustom;
      $("customFields").hidden = !isCustom;
      document.querySelectorAll("[data-provider-mode]").forEach((button) => {
        const active = button.dataset.providerMode === state.providerMode;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
        button.setAttribute("tabindex", active ? "0" : "-1");
      });
      setGroupDisabled("lazycatFields", isCustom);
      setGroupDisabled("customFields", !isCustom);
      if (isCustom) {
        updateCustomSuggestedPath();
      } else {
        updateSuggestedPath();
      }
      updateProviderSubmitState();
    }

    function setProviderMode(mode) {
      state.providerMode = mode === "custom" ? "custom" : "lazycat";
      renderProviderMode();
    }

    function setGroupDisabled(id, disabled) {
      document.querySelectorAll(`#${id} input, #${id} select, #${id} button`).forEach((node) => {
        node.disabled = disabled;
      });
    }

    function renderStatus() {
      const box = $("statusPills");
      box.replaceChildren();
      box.appendChild(pill(state.status && state.status.has_user_ticket ? t("ticketCaptured") : t("waitingTicket"), state.status && state.status.has_user_ticket ? "ok" : "warn"));
      if (state.status && state.status.version) {
        box.appendChild(pill(t("versionLabel", { version: state.status.version }), "info"));
      }
      box.appendChild(pill(t("tokenCount", { count: state.tokens.length }), "info"));
      box.appendChild(pill(t("providerCount", { count: state.providers.length }), "info"));
    }

    function renderApps() {
      const select = $("appSelect");
      const selected = select.value;
      select.replaceChildren();
      if (state.apps.length === 0) {
        const option = new Option(t("noResourceApps"), "");
        select.appendChild(option);
        select.disabled = true;
        updateProviderSubmitState();
        $("resourceSelect").replaceChildren();
        $("endpointInput").value = "";
        $("slugInput").value = "";
        $("suggestedPath").textContent = "";
        return;
      }
      select.disabled = false;
      updateProviderSubmitState();
      state.apps.forEach((app) => {
        const suffix = app.has_mcp ? "MCP" : "Skill";
        const option = new Option(`${app.title} · ${app.app_id} · ${suffix}`, app.app_id);
        select.appendChild(option);
      });
      if (selected && state.apps.some((app) => app.app_id === selected)) {
        select.value = selected;
      }
      applySelectedApp();
    }

    function applySelectedApp() {
      const app = selectedApp();
      if (!app) return;
      $("slugInput").value = app.default_slug || app.app_id;
      const resourceSelect = $("resourceSelect");
      resourceSelect.replaceChildren();
      if (app.mcp_providers && app.mcp_providers.length) {
        app.mcp_providers.forEach((resource) => {
          const option = new Option(`${resource.resource_id} · ${resource.endpoint}`, resource.resource_id);
          option.dataset.endpoint = resource.endpoint;
          resourceSelect.appendChild(option);
        });
        const preferred = app.default_mcp_resource || app.mcp_providers[0].resource_id;
        resourceSelect.value = preferred;
        $("endpointInput").value = app.default_endpoint || resourceSelect.selectedOptions[0].dataset.endpoint || "/mcp";
      } else {
        const option = new Option(t("manualInput"), "");
        resourceSelect.appendChild(option);
        $("endpointInput").value = "/mcp";
      }
      updateSuggestedPath();
    }

    function selectedApp() {
      const appID = $("appSelect").value;
      return state.apps.find((app) => app.app_id === appID);
    }

    function updateSuggestedPath() {
      const slug = $("slugInput").value.trim();
      $("suggestedPath").textContent = slug ? `/mcp/apps/${slug}` : "";
    }

    function updateCustomSuggestedPath() {
      const slug = $("customSlugInput").value.trim();
      $("suggestedPath").textContent = slug ? `/mcp/apps/${slug}` : "";
    }

    function renderTokens() {
      $("tokenCount").textContent = String(state.tokens.length);
      const list = $("tokenList");
      list.replaceChildren();
      if (state.tokens.length === 0) {
        list.appendChild(empty(t("noTokens")));
        return;
      }
      state.tokens.forEach((token) => {
        const item = document.createElement("div");
        item.className = "item";
        const row = document.createElement("div");
        row.className = "item-row";
        const left = document.createElement("div");
        const name = document.createElement("h3");
        name.textContent = token.name;
        const prefix = document.createElement("div");
        prefix.className = "mono muted";
        prefix.textContent = token.prefix;
        left.append(name, prefix);
        const actions = document.createElement("div");
        actions.className = "actions";
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.textContent = token.enabled ? t("disable") : t("enable");
        toggle.addEventListener("click", () => setTokenEnabled(token, !token.enabled));
        const del = document.createElement("button");
        del.type = "button";
        del.className = "danger";
        del.textContent = t("delete");
        del.addEventListener("click", () => deleteToken(token.id));
        actions.append(toggle, del);
        row.append(left, actions);
        item.append(row, pill(token.enabled ? t("enabled") : t("disabled"), token.enabled ? "ok" : "warn"));
        list.appendChild(item);
      });
    }

    function renderProviders() {
      $("providerCount").textContent = String(state.providers.length);
      const list = $("providerList");
      list.replaceChildren();
      if (state.providers.length === 0) {
        list.appendChild(empty(t("noProviders")));
        return;
      }
      state.providers.forEach((provider) => {
        const item = document.createElement("div");
        item.className = "item";
        const row = document.createElement("div");
        row.className = "item-row";
        const left = document.createElement("div");
        const title = document.createElement("h3");
        title.textContent = provider.name;
        const path = document.createElement("div");
        path.className = "mono";
        path.textContent = provider.public_endpoint;
        const upstream = document.createElement("div");
        upstream.className = "mono muted";
        upstream.textContent = provider.type === "custom"
          ? `${provider.base_url || ""}${provider.endpoint}${provider.header_count ? ` · ${provider.header_count} headers` : ""}`
          : `${provider.app_id}${provider.endpoint}`;
        left.append(title, path, upstream);
        const actions = document.createElement("div");
        actions.className = "actions";
        const copy = document.createElement("button");
        copy.type = "button";
        copy.textContent = t("copy");
        copy.addEventListener("click", () => copyText(location.origin + provider.public_endpoint));
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.textContent = provider.enabled ? t("stop") : t("enable");
        toggle.addEventListener("click", () => setProviderEnabled(provider, !provider.enabled));
        const del = document.createElement("button");
        del.type = "button";
        del.className = "danger";
        del.textContent = t("delete");
        del.addEventListener("click", () => deleteProvider(provider.id));
        actions.append(copy, toggle, del);
        row.append(left, actions);
        item.append(row, pill(provider.type === "custom" ? t("upstreamCustom") : t("upstreamLazycat"), "info"), pill(provider.enabled ? t("available") : t("stopped"), provider.enabled ? "ok" : "warn"));
        list.appendChild(item);
      });
    }

    function renderSkill() {
      const path = state.status ? state.status.skill_install_path : "";
      $("skillPath").textContent = path ? location.origin + path : "-";
      $("selfMcpPath").textContent = state.status ? location.origin + state.status.mcp_endpoint : "/mcp";
      $("buildInfo").textContent = state.status ? formatBuildInfo(state.status) : "-";
    }

    function updateProviderSubmitState() {
      $("saveProviderBtn").disabled = state.providerMode !== "custom" && state.apps.length === 0;
    }

    function formatBuildInfo(status) {
      const buildTime = status.build_time || "unknown";
      const commit = status.commit || "unknown";
      return `${t("buildTime")}: ${formatBuildTime(buildTime)} · ${t("commit")}: ${commit}`;
    }

    function formatBuildTime(value) {
      if (!value || value === "unknown") return value || "unknown";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString(currentLang === "zh" ? "zh-CN" : "en-US", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function pill(text, tone) {
      const span = document.createElement("span");
      span.className = `pill ${tone || ""}`;
      span.textContent = text;
      return span;
    }

    function empty(text) {
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = text;
      return div;
    }

    function addHeaderRow(name = "", value = "") {
      const row = document.createElement("div");
      row.className = "header-row";
      const nameInput = document.createElement("input");
      nameInput.placeholder = t("headerName");
      nameInput.autocomplete = "off";
      nameInput.value = name;
      const valueInput = document.createElement("input");
      valueInput.placeholder = t("headerValue");
      valueInput.autocomplete = "off";
      valueInput.value = value;
      const remove = document.createElement("button");
      remove.type = "button";
      remove.className = "danger compact";
      remove.textContent = "x";
      remove.setAttribute("aria-label", t("removeHeader"));
      remove.addEventListener("click", () => row.remove());
      row.append(nameInput, valueInput, remove);
      $("headerRows").appendChild(row);
    }

    function readHeaderRows() {
      return Array.from(document.querySelectorAll("#headerRows .header-row")).map((row) => {
        const inputs = row.querySelectorAll("input");
        return {
          name: inputs[0].value.trim(),
          value: inputs[1].value.trim()
        };
      }).filter((header) => header.name || header.value);
    }

    async function createToken(event) {
      event.preventDefault();
      const name = $("tokenNameInput").value.trim() || "MCP Token";
      const data = await api("/api/tokens", {
        method: "POST",
        body: JSON.stringify({ name })
      });
      $("tokenNameInput").value = "";
      $("tokenOnce").style.display = "grid";
      $("tokenValue").textContent = data.token.token;
      await loadAll();
    }

    async function setTokenEnabled(token, enabled) {
      await api(`/api/tokens/${token.id}`, {
        method: "PATCH",
        body: JSON.stringify({ enabled })
      });
      await loadAll();
    }

    async function deleteToken(id) {
      await api(`/api/tokens/${id}`, { method: "DELETE", headers: {} });
      await loadAll();
    }

    async function saveProvider(event) {
      event.preventDefault();
      if (state.providerMode === "custom") {
        return saveCustomProvider();
      }
      const app = selectedApp();
      if (!app) return;
      const resourceOption = $("resourceSelect").selectedOptions[0];
      const resourceID = resourceOption ? resourceOption.value : "";
      const body = {
        type: "lazycat",
        name: app.title || app.app_id,
        slug: $("slugInput").value.trim(),
        app_id: app.app_id,
        app_title: app.title,
        deploy_id: app.deploy_id || "",
        resource_id: resourceID,
        endpoint: $("endpointInput").value.trim(),
        transport: "streamable_http",
        enabled: true
      };
      await api("/api/providers", {
        method: "POST",
        body: JSON.stringify(body)
      });
      showToast(t("saved"));
      await loadAll();
    }

    async function saveCustomProvider() {
      const body = {
        type: "custom",
        name: $("customNameInput").value.trim(),
        description: $("customDescriptionInput").value.trim(),
        slug: $("customSlugInput").value.trim(),
        base_url: $("customBaseURLInput").value.trim(),
        endpoint: $("customEndpointInput").value.trim(),
        transport: $("customTransportSelect").value,
        headers: readHeaderRows(),
        enabled: true
      };
      await api("/api/providers", {
        method: "POST",
        body: JSON.stringify(body)
      });
      $("customNameInput").value = "";
      $("customDescriptionInput").value = "";
      $("customSlugInput").value = "";
      $("customBaseURLInput").value = "";
      $("customEndpointInput").value = "/mcp";
      $("customTransportSelect").value = "streamable_http";
      $("headerRows").replaceChildren();
      updateCustomSuggestedPath();
      showToast(t("saved"));
      await loadAll();
    }

    async function setProviderEnabled(provider, enabled) {
      await api(`/api/providers/${provider.id}`, {
        method: "PATCH",
        body: JSON.stringify({ enabled })
      });
      await loadAll();
    }

    async function deleteProvider(id) {
      await api(`/api/providers/${id}`, { method: "DELETE", headers: {} });
      await loadAll();
    }

    $("appSelect").addEventListener("change", applySelectedApp);
    $("resourceSelect").addEventListener("change", () => {
      const option = $("resourceSelect").selectedOptions[0];
      if (option && option.dataset.endpoint) $("endpointInput").value = option.dataset.endpoint;
    });
    $("slugInput").addEventListener("input", updateSuggestedPath);
    $("customSlugInput").addEventListener("input", updateCustomSuggestedPath);
    $("addHeaderBtn").addEventListener("click", () => addHeaderRow());
    document.querySelectorAll("[data-provider-mode]").forEach((button) => {
      button.addEventListener("click", () => setProviderMode(button.dataset.providerMode));
    });
    $("providerForm").addEventListener("submit", (event) => saveProvider(event).catch((err) => showToast(err.message)));
    $("tokenForm").addEventListener("submit", (event) => createToken(event).catch((err) => showToast(err.message)));
    $("reloadBtn").addEventListener("click", () => loadAll().catch((err) => showToast(err.message)));
    $("copyTokenBtn").addEventListener("click", () => copyText($("tokenValue").textContent));
    $("copySkillBtn").addEventListener("click", () => copyText($("skillPath").textContent));
    document.querySelectorAll("[data-lang-option]").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.langOption));
    });

    setLanguage(currentLang, false);
    loadAll().catch((err) => showToast(err.message));
  </script>
</body>
</html>
