application:
  subdomain: lazycat-mcp
  background_task: true
  multi_instance: true
  gpu_accel: false
  kvm_accel: false
  usb_accel: false
  environment:
    - LAZYCAT_MCP_DB=/lzcapp/var/data/lazycat-mcp.db
  public_path:
    - /mcp
    - /sse
    - /message
    - /skills
  upstreams:
    - location: /
      backend: http://127.0.0.1:3000/
      backend_launch_command: /lzcapp/pkg/content/lazycat-mcp
